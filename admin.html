<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THP Admin Panel</title>

<link rel="stylesheet" href="css/style.css">

<style>

.container{
max-width:1200px;
margin:auto;
padding:30px;
}

.match-select{
display:flex;
justify-content:center;
margin:30px 0;
}

.match-select select{
padding:12px;
font-size:18px;
border-radius:10px;
background:#222;
color:white;
border:2px solid #9333ea;
}

table{
width:100%;
margin-top:30px;
border-collapse:collapse;
}

th{
background:#7b2cbf;
padding:15px;
}

td{
padding:12px;
text-align:center;
background:#111;
}

input{
width:70px;
padding:8px;
background:#222;
color:white;
border:none;
border-radius:8px;
text-align:center;
}

.save{
margin-top:30px;
display:flex;
justify-content:center;
}

button{
padding:16px 40px;
font-size:18px;
background:#9333ea;
color:white;
border:none;
border-radius:15px;
cursor:pointer;
box-shadow:0 0 20px #9333ea;
}

button:hover{
background:#c026d3;
}

</style>

</head>

<body>

<header class="header">

<img src="assets/logo.png" class="logo">

<h1>ADMIN PANEL</h1>

<p>THP Championship</p>

</header>

<div class="container">

<div class="match-select">

<select>

<option>Match 1</option>
<option>Match 2</option>
<option>Match 3</option>
<option>Match 4</option>

</select>

</div>

<table>

<tr>

<th>Đội</th>

<th>Top</th>

<th>Kill</th>

<th>Điểm</th>

</tr>
<tr><td>Đội 1</td><td><input type="number" min="1" max="12"></td><td><input type="number"></td><td>0</td></tr>
<tr><td>Đội 2</td><td><input type="number" min="1" max="12"></td><td><input type="number"></td><td>0</td></tr>
<tr><td>Đội 3</td><td><input type="number" min="1" max="12"></td><td><input type="number"></td><td>0</td></tr>
<tr><td>Đội 4</td><td><input type="number" min="1" max="12"></td><td><input type="number"></td><td>0</td></tr>
<tr><td>Đội 5</td><td><input type="number" min="1" max="12"></td><td><input type="number"></td><td>0</td></tr>
<tr><td>Đội 6</td><td><input type="number" min="1" max="12"></td><td><input type="number"></td><td>0</td></tr>
<tr><td>Đội 7</td><td><input type="number" min="1" max="12"></td><td><input type="number"></td><td>0</td></tr>
<tr><td>Đội 8</td><td><input type="number" min="1" max="12"></td><td><input type="number"></td><td>0</td></tr>
<tr><td>Đội 9</td><td><input type="number" min="1" max="12"></td><td><input type="number"></td><td>0</td></tr>
<tr><td>Đội 10</td><td><input type="number" min="1" max="12"></td><td><input type="number"></td><td>0</td></tr>
<tr><td>Đội 11</td><td><input type="number" min="1" max="12"></td><td><input type="number"></td><td>0</td></tr>
<tr><td>Đội 12</td><td><input type="number" min="1" max="12"></td><td><input type="number"></td><td>0</td></tr>
</table>

<div class="save">
<button>LƯU KẾT QUẢ</button>
</div>

</div>

<script src="js/app.js"></script>

</body>
</html>
